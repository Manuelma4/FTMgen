# FTMgen - vhost HTTP initial pour ftm.moduo.fr.
# Apache termine TLS et reste le seul point d'entree public. Le conteneur est
# publie uniquement sur 127.0.0.1:8060.
#
# Certbot cree normalement ftm-le-ssl.conf a partir de ce vhost. Dans le vhost
# HTTPS genere, verifier imperativement:
#   RequestHeader set X-Forwarded-Proto "https"
#   RequestHeader set X-Forwarded-Port "443"
#   ProxyTimeout 900

<VirtualHost *:80>
    ServerName ftm.moduo.fr

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyAddHeaders On
    ProxyTimeout 900

    ProxyPass        / http://127.0.0.1:8060/ connectiontimeout=10 timeout=900
    ProxyPassReverse / http://127.0.0.1:8060/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"

    ErrorLog  ${APACHE_LOG_DIR}/ftmgen-error.log
    CustomLog ${APACHE_LOG_DIR}/ftmgen-access.log combined

    RewriteEngine On
    RewriteCond %{SERVER_NAME} =ftm.moduo.fr
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
